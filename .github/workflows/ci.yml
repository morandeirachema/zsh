name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: CI only reads the repo. The token below is used solely to
# raise the GitHub API rate limit for release-binary version lookups.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh + shellcheck
        run: sudo apt-get update && sudo apt-get install -y zsh shellcheck
      - name: shellcheck (shell scripts)
        run: shellcheck --severity=warning --shell=bash install.sh uninstall.sh scripts/*.sh
      - name: bash -n (install.sh)
        run: bash -n install.sh
      - name: zsh -n (zsh configs)
        run: |
          zsh -n zsh/.zshrc
          zsh -n zsh/aliases.zsh
      - name: Validate TOML (starship + alacritty)
        run: |
          python3 -c "import tomllib; tomllib.load(open('starship/starship.toml','rb'))"
          python3 -c "import tomllib; tomllib.load(open('alacritty/alacritty.toml','rb'))"
      - name: Validate git-delta fragment
        run: git config -f git/delta.gitconfig --list
      - name: --dry-run and --doctor exit 0 and touch nothing
        run: |
          # run against an isolated empty HOME so any stray write is detectable
          h="$(mktemp -d)"
          HOME="$h" ./install.sh --dry-run -y --no-chsh >/dev/null
          HOME="$h" ./install.sh --doctor              >/dev/null
          n="$(find "$h" -mindepth 1 | wc -l)"
          [ "$n" -eq 0 ] || { echo "::error::--dry-run/--doctor wrote $n entries to \$HOME"; find "$h" -mindepth 1; exit 1; }
          echo "✓ dry-run + doctor: exit 0, zero writes"
      - name: Lua parse (nvim config)
        run: |
          sudo apt-get install -y lua5.4 || sudo apt-get install -y lua5.3 || true
          for f in $(find nvim -name '*.lua'); do luac5.4 -p "$f" || luac5.3 -p "$f" || echo "skip $f"; done

  smoke:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            image: ubuntu:24.04
            prep: apt-get update && apt-get install -y sudo git curl ca-certificates zsh
            args: --minimal --no-chsh -y
          - name: fedora
            image: fedora:latest
            prep: dnf install -y sudo git curl zsh
            args: --minimal --no-chsh -y
          - name: arch
            image: archlinux:latest
            prep: pacman -Sy --noconfirm sudo git curl zsh
            args: --minimal --no-chsh -y
          - name: ubuntu-offline
            image: ubuntu:24.04
            prep: apt-get update && apt-get install -y sudo git curl ca-certificates zsh
            args: --offline --minimal --no-chsh -y
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test on ${{ matrix.name }}
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo "${{ matrix.image }}" bash -ec '
            ${{ matrix.prep }}
            ./install.sh ${{ matrix.args }}
            test -L "$HOME/.zshrc"                    && echo "✓ ~/.zshrc symlinked"
            test -L "$HOME/.config/starship.toml"     && echo "✓ starship.toml symlinked"
            zsh -ic "exit 0"                          && echo "✓ interactive zsh loads"
            echo "smoke OK on ${{ matrix.name }}"
          '

  extras:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            image: ubuntu:24.04
            prep: apt-get update && apt-get install -y sudo git curl ca-certificates zsh
          - name: fedora
            image: fedora:latest
            prep: dnf install -y sudo git curl zsh
          - name: arch
            image: archlinux:latest
            prep: pacman -Sy --noconfirm sudo git curl zsh
    steps:
      - uses: actions/checkout@v4
      # Non-minimal install (minus the slow nvim + font) so the extras path is
      # actually exercised: pass, fabric (SHA256-verified GitHub release),
      # tmux-sessionizer symlink, and the fzf preview opts. Asserted by
      # scripts/ci-extras-check.sh (fabric is a soft check — network dependent).
      - name: Extras + uninstall on ${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ github.token }}   # authenticated API calls → no rate limit
        run: |
          docker run --rm -e GITHUB_TOKEN -v "$PWD:/repo" -w /repo "${{ matrix.image }}" bash -ec '
            ${{ matrix.prep }}
            ./install.sh --no-nvim --no-font --no-chsh -y
            bash scripts/ci-extras-check.sh ${{ matrix.name }}
            ./uninstall.sh
            bash scripts/ci-uninstall-check.sh ${{ matrix.name }}
          '
