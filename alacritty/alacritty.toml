# Alacritty — symlinked to ~/.config/alacritty/alacritty.toml by install.sh.
# GPU-accelerated, deliberately minimal: tmux handles tabs/splits/sessions.
# Docs: https://alacritty.org  ·  config reference: https://alacritty.org/config-alacritty.html

[env]
TERM = "xterm-256color"

[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.98
decorations = "full"
dynamic_title = true

[scrolling]
history = 50000

# JetBrainsMono Nerd Font — the same font install.sh installs, so prompt/tmux/nvim
# glyphs render with no manual "set your terminal font" step.
[font]
size = 12.0
normal      = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold        = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic      = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

[cursor]
style = { shape = "Block", blinking = "Off" }

# ── Catppuccin Mocha ── matches the starship prompt, tmux status bar, and LazyVim.
[colors.primary]
background        = "#1e1e2e"
foreground        = "#cdd6f4"
dim_foreground    = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5e0dc"

[colors.selection]
text       = "#1e1e2e"
background = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"
