# lazygit config — https://github.com/jesseduffield/lazygit
# Options reference: https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md
gui:
  nerdFontsVersion: "3"   # file-type / git icons (needs a Nerd Font in your terminal)
  showFileTree: true
  showRandomTip: false
git:
  paging:
    colorArg: always
    pager: delta --paging=never   # reuse git-delta so lazygit diffs match your CLI diffs
