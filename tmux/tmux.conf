# tmux config — symlinked to ~/.config/tmux/tmux.conf by install.sh
# Docs: https://github.com/tmux/tmux/wiki  ·  reload with: prefix + r

# --- general ---
set  -g  mouse on
set  -g  base-index 1              # windows start at 1
setw -g  pane-base-index 1
set  -g  renumber-windows on       # keep window numbers gapless
set  -g  history-limit 50000
set  -sg escape-time 10            # snappier ESC (nvim-friendly)
set  -g  focus-events on
setw -g  mode-keys vi              # vi keys in copy mode

# --- truecolor / 256-color (matches the shell + nvim theme) ---
set  -g  default-terminal "tmux-256color"
set  -ga terminal-overrides ",*256col*:Tc"

# --- keys ---
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
# splits/new-windows keep the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"
# vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# prefix-free pane switching (Alt + arrows)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
# repeatable pane resize (prefix, then hold Shift+h/j/k/l)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
setw -g aggressive-resize on

# --- copy mode: vi keys + system clipboard (OSC52 → works over SSH) ---
set  -g  set-clipboard on
set  -g  status-keys vi
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel

# --- status bar (Catppuccin Mocha, to match the prompt) ---
set  -g  status-position top
set  -g  status-interval 5
set  -g  status-style "bg=#1e1e2e,fg=#cdd6f4"
set  -g  status-left-length 30
set  -g  status-left  "#[bg=#89b4fa,fg=#11111b,bold] #S #[bg=#1e1e2e,fg=#89b4fa]#[default] "
set  -g  status-right "#[fg=#a6adc8]#H #[bg=#89b4fa,fg=#11111b,bold] %Y-%m-%d %H:%M "
setw -g  window-status-current-format "#[fg=#a6e3a1,bold]#I:#W "
setw -g  window-status-format         "#[fg=#6c7086]#I:#W "
set  -g  pane-border-style        "fg=#45475a"
set  -g  pane-active-border-style "fg=#89b4fa"
