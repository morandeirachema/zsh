# Starship prompt — rounded "pill" segments (Catppuccin Mocha palette).
# Requires a Nerd Font: https://www.nerdfonts.com/
# Each segment is a self-contained capsule, so empty ones vanish cleanly.
# Config reference: https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = "console"

format = """
$os\
$directory\
$git_branch\
$git_status\
$nodejs$python$rust$golang$java$php$c\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

# Catppuccin Mocha — https://github.com/catppuccin/catppuccin
[palettes.console]
crust    = "#11111b"   # dark text on bright pills
text_lt  = "#cdd6f4"   # light text on dark pills
os_bg    = "#45475a"   # surface1
dir      = "#89b4fa"   # blue
git      = "#a6e3a1"   # green
warn     = "#f9e2af"   # yellow  (dirty git)
lang     = "#94e2d5"   # teal
meta     = "#cba6f7"   # mauve   (docker)
dur      = "#585b70"   # surface2 (command time)
muted    = "#6c7086"   # overlay0 (clock)

[os]
disabled = false
style = "fg:text_lt bg:os_bg"
format = "[](fg:os_bg)[$symbol]($style)[](fg:os_bg) "
[os.symbols]
Ubuntu  = "󰕈"
Debian  = ""
Arch    = ""
Fedora  = ""
Alpine  = ""
Linux   = ""
Macos   = ""
Windows = ""

[directory]
style = "fg:crust bg:dir"
format = "[](fg:dir)[  $path$read_only ]($style)[](fg:dir) "
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true
read_only = "  "
repo_root_style = "bold fg:crust bg:dir"       # highlight the repo-root folder
before_repo_root_style = "fg:crust bg:dir"
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Pictures"  = " "
"Music"     = " "
"Videos"    = " "
"Projects"  = " "
"code"      = " "
".config"   = " "

[git_branch]
symbol = ""
style = "fg:crust bg:git"
format = "[](fg:git)[ $symbol ]($style)[$branch ](bold fg:crust bg:git)[](fg:git) "

[git_status]
style = "fg:crust bg:warn"
format = "([](fg:warn)[ $all_status$ahead_behind ]($style)[](fg:warn) )"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
untracked = "?${count}"
modified  = "!${count}"
staged    = "+${count}"
renamed   = "»${count}"
deleted   = "✘${count}"
stashed   = "≡"

[nodejs]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[python]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[rust]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[golang]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[java]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[php]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[c]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "

[docker_context]
symbol = ""
style = "fg:crust bg:meta"
format = "[](fg:meta)[ $symbol $context ]($style)[](fg:meta) "
only_with_files = true

[cmd_duration]
min_time = 500
style = "fg:text_lt bg:dur"
format = "[](fg:dur)[  $duration ]($style)[](fg:dur) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = "[  $time ]($style)"

[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[❯](bold #f38ba8)"
vicmd_symbol = "[❮](bold #a6e3a1)"
