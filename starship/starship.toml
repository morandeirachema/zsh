# Starship prompt — rounded "pill" segments (Tokyo-Night palette).
# Requires a Nerd Font: https://www.nerdfonts.com/
# Each segment is a self-contained capsule, so empty ones vanish cleanly.
# Config reference: https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
palette = "console"

format = """
$os\
$directory\
$git_branch\
$git_status\
$nodejs$python$rust$golang$java$php$c\
$docker_context\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

[palettes.console]
crust    = "#16161e"   # dark text on bright pills
text_lt  = "#c0caf5"   # light text on dark pills
os_bg    = "#414868"
dir      = "#7aa2f7"   # blue
git      = "#9ece6a"   # green
warn     = "#e0af68"   # yellow  (dirty git)
lang     = "#2ac3de"   # cyan
meta     = "#bb9af7"   # purple  (docker)
dur      = "#9d7cd8"   # muted purple (command time)
muted    = "#565f89"

[os]
disabled = false
style = "fg:text_lt bg:os_bg"
format = "[](fg:os_bg)[$symbol]($style)[](fg:os_bg) "
[os.symbols]
Ubuntu  = "󰕈"
Debian  = ""
Arch    = ""
Fedora  = ""
Alpine  = ""
Linux   = ""
Macos   = ""
Windows = ""

[directory]
style = "fg:crust bg:dir"
format = "[](fg:dir)[  $path$read_only ]($style)[](fg:dir) "
truncation_length = 3
truncate_to_repo = true
read_only = "  "
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Pictures"  = " "
"code"      = " "

[git_branch]
symbol = ""
style = "fg:crust bg:git"
format = "[](fg:git)[ $symbol $branch ]($style)[](fg:git) "

[git_status]
style = "fg:crust bg:warn"
format = "([](fg:warn)[ $all_status$ahead_behind ]($style)[](fg:warn) )"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
untracked = "?${count}"
modified  = "!${count}"
staged    = "+${count}"
renamed   = "»${count}"
deleted   = "✘${count}"
stashed   = "≡"

[nodejs]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[python]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[rust]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[golang]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[java]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[php]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "
[c]
symbol = ""
style = "fg:crust bg:lang"
format = "[](fg:lang)[ $symbol $version ]($style)[](fg:lang) "

[docker_context]
symbol = ""
style = "fg:crust bg:meta"
format = "[](fg:meta)[ $symbol $context ]($style)[](fg:meta) "
only_with_files = true

[cmd_duration]
min_time = 500
style = "fg:text_lt bg:dur"
format = "[](fg:dur)[  $duration ]($style)[](fg:dur) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = "[  $time ]($style)"

[character]
success_symbol = "[❯](bold #9ece6a)"
error_symbol = "[❯](bold #f7768e)"
vicmd_symbol = "[❮](bold #9ece6a)"
