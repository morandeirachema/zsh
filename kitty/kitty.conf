# kitty — symlinked to ~/.config/kitty/kitty.conf by install.sh.
# Catppuccin Mocha + JetBrainsMono Nerd Font, matching the prompt, tmux, and nvim.
# Docs: https://sw.kovidgoyal.net/kitty/conf/

# --- font (bold/italic auto-selected from the family) ---
font_family        JetBrainsMono Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size          12.0

# --- window ---
window_padding_width    10
background_opacity      0.98
scrollback_lines        50000
enable_audio_bell       no
confirm_os_window_close 0

# --- cursor ---
cursor_shape          block
cursor_blink_interval 0

# ── Catppuccin Mocha ── matches starship, tmux, Alacritty, and LazyVim.
foreground            #cdd6f4
background            #1e1e2e
selection_foreground  #1e1e2e
selection_background  #f5e0dc
cursor                #f5e0dc
cursor_text_color     #1e1e2e
url_color             #f5e0dc

# black / bright-black
color0  #45475a
color8  #585b70
# red
color1  #f38ba8
color9  #f38ba8
# green
color2  #a6e3a1
color10 #a6e3a1
# yellow
color3  #f9e2af
color11 #f9e2af
# blue
color4  #89b4fa
color12 #89b4fa
# magenta
color5  #f5c2e7
color13 #f5c2e7
# cyan
color6  #94e2d5
color14 #94e2d5
# white / bright-white
color7  #bac2de
color15 #a6adc8

# --- tab bar (themed) ---
active_tab_foreground   #11111b
active_tab_background    #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background  #313244
